<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NFTones</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #c4b5fd;
      }
      p {
        color: #a1a1aa;
        font-size: 0.875rem;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #27272a;
        border-top-color: #c4b5fd;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main class="wrap" role="main">
      <div class="spinner" role="status" aria-label="Loading NFTones"></div>
      <h1>NFTones</h1>
      <p>Connecting to your library&hellip;</p>
    </main>
  </body>
</html>
