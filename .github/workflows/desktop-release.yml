name: desktop-release

# Builds the Tauri desktop shell for Windows / macOS / Linux on tag push,
# signs Windows installer via Azure Artifact Signing (formerly Trusted
# Signing), and publishes artifacts as a GitHub Release.
#
# Trigger:
#   git tag desktop-v0.1.0
#   git push origin desktop-v0.1.0
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AZURE_TENANT_ID         — Entra tenant for the App Registration
#   AZURE_CLIENT_ID         — App Registration client id
#   AZURE_CLIENT_SECRET     — App Registration client secret
#                             The App Registration must have the
#                             "Trusted Signing Certificate Profile Signer"
#                             role on the signing account.
#   AZURE_SIGNING_ENDPOINT  — e.g. https://wus.codesigning.azure.net/
#   AZURE_SIGNING_ACCOUNT   — Artifact Signing account name
#   AZURE_SIGNING_PROFILE   — certificate profile name (e.g. nftones-prod)
#   TAURI_UPDATER_PUBKEY    — Ed25519 pubkey (matches tauri.conf.json)
#   TAURI_UPDATER_PRIVKEY   — base64 Ed25519 privkey (`tauri signer generate`)
#   TAURI_UPDATER_PRIVKEY_PASSWORD — passphrase for the privkey

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build & bundle Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVKEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVKEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      # ------- Windows-only: sign installer with Azure Artifact Signing -------

      - name: Install Azure Artifact Signing client tools (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          winget install -e --id Microsoft.Azure.ArtifactSigningClientTools `
            --accept-source-agreements --accept-package-agreements

      - name: Sign Windows installers with Azure Trusted Signing
        if: matrix.platform == 'windows-latest'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: desktop/src-tauri/target/release/bundle
          files-folder-filter: msi,exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nftones-desktop-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/**/latest.json
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NFTones Desktop ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/latest.json
